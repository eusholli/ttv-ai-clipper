steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--platform', 'linux/amd64',
      '-t', 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA',
      '.'
    ]
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'ttv-ai-clipper'
    - '--image'
    - 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--memory'
    - '2Gi'
    - '--cpu'
    - '2'
    - '--min-instances'
    - '1'
    - '--max-instances'
    - '10'
    - '--set-env-vars'
    - 'NODE_ENV=production'
    - '--set-secrets'
    - 'CLOUDFLARE_ACCOUNT_ID=projects/$PROJECT_ID/secrets/CLOUDFLARE_ACCOUNT_ID:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_TOKEN_ID=projects/$PROJECT_ID/secrets/CLOUDFLARE_TOKEN_ID:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_ACCESS_KEY_ID=projects/$PROJECT_ID/secrets/CLOUDFLARE_ACCESS_KEY_ID:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_SECRET_ACCESS_KEY=projects/$PROJECT_ID/secrets/CLOUDFLARE_SECRET_ACCESS_KEY:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_BUCKET_NAME=projects/$PROJECT_ID/secrets/CLOUDFLARE_BUCKET_NAME:latest'
    - '--set-secrets'
    - 'STRIPE_SECRET_KEY=projects/$PROJECT_ID/secrets/STRIPE_SECRET_KEY:latest'
    - '--set-secrets'
    - 'STRIPE_WEBHOOK_SECRET=projects/$PROJECT_ID/secrets/STRIPE_WEBHOOK_SECRET:latest'
    - '--set-secrets'
    - 'FRONTEND_URL=projects/$PROJECT_ID/secrets/FRONTEND_URL:latest'
    - '--set-secrets'
    - 'DB_NAME=projects/$PROJECT_ID/secrets/DB_NAME:latest'
    - '--set-secrets'
    - 'DB_USER=projects/$PROJECT_ID/secrets/DB_USER:latest'
    - '--set-secrets'
    - 'DB_PWD=projects/$PROJECT_ID/secrets/DB_PWD:latest'
    - '--set-secrets'
    - 'DB_HOST=projects/$PROJECT_ID/secrets/DB_HOST:latest'

images:
  - 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
