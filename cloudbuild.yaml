steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--platform', 'linux/amd64',
      '-t', 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA',
      '.'
    ]
    id: 'build'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA']
    id: 'push'
    waitFor: ['build']

  # Create VPC connector if it doesn't exist (without --async to ensure completion)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'compute'
    - 'networks'
    - 'vpc-access'
    - 'connectors'
    - 'create'
    - 'ttv-connector'
    - '--network'
    - 'default'
    - '--region'
    - 'us-central1'
    - '--range'
    - '10.8.0.0/28'
    - '--min-instances'
    - '2'
    - '--max-instances'
    - '3'
    - '--machine-type'
    - 'e2-micro'
    id: 'create-vpc'
    waitFor: ['push']
    
  # Add firewall rule for all outbound traffic
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'compute'
    - 'firewall-rules'
    - 'create'
    - 'allow-all-egress'
    - '--direction=EGRESS'
    - '--priority=1000'
    - '--network=default'
    - '--action=ALLOW'
    - '--rules=tcp:80,tcp:443,tcp:5432'
    - '--destination-ranges=0.0.0.0/0'
    - '--target-tags=cloudsql-proxy'
    waitFor: ['create-vpc']
    
  # Add this new step to set IAM policy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'beta'
    - 'run'
    - 'services'
    - 'add-iam-policy-binding'
    - 'ttv-ai-clipper'
    - '--region=us-central1'
    - '--member=allUsers'
    - '--role=roles/run.invoker'
    waitFor: ['create-vpc']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'ttv-ai-clipper'
    - '--image'
    - 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--memory'
    - '4Gi'
    - '--cpu'
    - '2'
    - '--min-instances'
    - '1'
    - '--max-instances'
    - '10'
    - '--vpc-connector'
    - 'ttv-connector'
    - '--vpc-egress'
    - 'all-traffic'
    - '--set-env-vars'
    - 'NODE_ENV=production'
    - '--set-secrets'
    - 'CLOUDFLARE_ACCOUNT_ID=CLOUDFLARE_ACCOUNT_ID:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_TOKEN_ID=CLOUDFLARE_TOKEN_ID:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_ACCESS_KEY_ID=CLOUDFLARE_ACCESS_KEY_ID:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_SECRET_ACCESS_KEY=CLOUDFLARE_SECRET_ACCESS_KEY:latest'
    - '--set-secrets'
    - 'CLOUDFLARE_BUCKET_NAME=CLOUDFLARE_BUCKET_NAME:latest'
    - '--set-secrets'
    - 'STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest'
    - '--set-secrets'
    - 'STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest'
    - '--set-secrets'
    - 'FRONTEND_URL=FRONTEND_URL:latest'
    - '--set-secrets'
    - 'DB_NAME=DB_NAME:latest'
    - '--set-secrets'
    - 'DB_USER=DB_USER:latest'
    - '--set-secrets'
    - 'DB_PWD=DB_PWD:latest'
    - '--set-secrets'
    - 'DB_HOST=DB_HOST:latest'
    waitFor: ['create-vpc']
    
images:
  - 'gcr.io/$PROJECT_ID/ttv-ai-clipper:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
